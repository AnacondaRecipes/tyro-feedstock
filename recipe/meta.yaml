{% set name = "tyro" %}
{% set version = "1.0.13" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/tyro-{{ version }}.tar.gz
  sha256: 731a90c9836b77fffe7c3fa0477ef2d3b6fa91252ddc0bb4d32dadd4fcc143d4

build:
  skip: true  # [py<38]
  script: {{ PYTHON }} -m pip install --no-deps . -vv --no-build-isolation
  number: 0

requirements:
  host:
    - python
    - hatchling
    - pip
  run:
    - python
    - typeguard >=4.0.0
    - docstring_parser >=0.15
    - typing-extensions >=4.13.0
    - eval-type-backport >=0.1.3  # [py<310]

test:
  imports:
    - tyro
  source_files:
    - tests
  requires:
    - pip
    - pytest >=7.1.2,<9.0.0
    - pyyaml >=6.0
    - attrs >=21.4.0
    - pydantic >=2.5.2,!=2.10.0
    - msgspec >=0.18.6
  commands:
    - pip check
    # omegaconf, ml-collections, shtab, and universal-pathlib are not on pkgs/main.
    - >
      pytest tests -vv --backend=tyro
      --ignore=tests/test_ml_collections.py
      --ignore=tests/test_unsupported_but_should_work.py
      --ignore=tests/test_completion_bash.py
      --ignore=tests/test_completion_spec.py
      --ignore=tests/test_completion_zsh.py
      --ignore=tests/test_py311_generated/test_ml_collections_generated.py
      --ignore=tests/test_py311_generated/test_unsupported_but_should_work_generated.py
      --ignore=tests/test_py311_generated/test_completion_bash_generated.py
      --ignore=tests/test_py311_generated/test_completion_spec_generated.py
      --ignore=tests/test_py311_generated/test_completion_zsh_generated.py
      -k "not upath"

about:
  home: https://github.com/brentyi/tyro
  summary: Strongly typed, zero-effort CLI interfaces
  description: |
    tyro.cli() generates command-line interfaces and config parsers from
    type-annotated Python functions and objects (dataclasses, pydantic, etc.).
  dev_url: https://github.com/brentyi/tyro
  doc_url: https://brentyi.github.io/tyro/
  license: MIT
  license_family: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - traversaro
